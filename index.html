  <script>const KEY='horas-liquid-v1';
const seed={works:[{id:'w1',name:'Consultoria UX',start:'09:00',end:'17:30',break:60,rate:85,extra:127.5,weekStart:0,icon:'✦'},{id:'w2',name:'Aulas particulares',start:'18:30',end:'21:30',break:0,rate:70,extra:105,weekStart:1,icon:'◌'}],records:[{id:'r1',workId:'w1',date:'2026-07-17',start:'09:00',end:'17:30',break:60,rate:85,extra:0,note:''},{id:'r2',workId:'w2',date:'2026-07-16',start:'18:30',end:'21:30',break:0,rate:70,extra:0,note:''},{id:'r3',workId:'w1',date:'2026-07-15',start:'09:00',end:'18:15',break:60,rate:85,extra:0,note:''},{id:'r4',workId:'w1',date:'2026-07-12',start:'09:30',end:'16:30',break:45,rate:85,extra:0,note:''}],page:'dashboard',tab:'summary',period:'week',filter:'all',selected:'2026-07-18'};
let state=JSON.parse(localStorage.getItem(KEY)||'null')||seed;state.profile??={name:'Lorrany',birthday:'',email:'lorrany@email.com',cover:''};state.prefs??={theme:'system',currency:'BRL',dateFormat:'DD/MM/AAAA'};state.goalHours??=30;state.loggedIn??=false;let modal=null;
const $=s=>document.querySelector(s);function money(n){const currency=state.prefs?.currency||'BRL';const locale={BRL:'pt-BR',USD:'en-US',EUR:'de-DE',GBP:'en-GB',JPY:'ja-JP'}[currency]||'pt-BR';return new Intl.NumberFormat(locale,{style:'currency',currency,maximumFractionDigits:currency==='JPY'?0:2}).format(n||0)}const work=id=>state.works.find(x=>x.id===id);
function hours(r){if(!r.start||!r.end)return 0;let [a,b]=[r.start,r.end].map(x=>{let [h,m]=x.split(':').map(Number);return h*60+m});if(b<a)b+=1440;return Math.max(0,(b-a-(+r.break||0))/60)}function value(r){return hours(r)*(+r.rate||0)+(+r.extra||0)}function fmtH(n){let m=Math.round(n*60);return `${Math.floor(m/60)}h ${m%60}min`};function dateLabel(d){return new Date(d+'T12:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}function toast(t){let el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2300)}
function filtered(){let now=new Date('2026-07-18T12:00'), start=new Date(now);if(state.period==='day')start=now; if(state.period==='week')start.setDate(now.getDate()-6);if(state.period==='month')start.setDate(1);return state.records.filter(r=>state.filter==='all'||r.workId===state.filter).filter(r=>new Date(r.date+'T12:00')>=start&&new Date(r.date+'T12:00')<=now)}
function header(){return `<header class="topbar"><div class="brand"><i></i>horas</div><div class="profile"><span>Olá, ${state.profile.name.split(' ')[0]}</span><div class="avatar">${state.profile.name[0]||'L'}</div></div></header>`}function nav(){return `<nav class="nav">${[['dashboard','Resumo','◫'],['calendar','Calendário','◌'],['work','Trabalhos','✦'],['settings','Ajustes','⚙']].map(([id,n,i])=>`<button class="${state.page===id?'active':''}" onclick="go('${id}')">${i} ${n}</button>`).join('')}</nav>`}
function dashboard(){let rs=filtered(), total=rs.reduce((a,r)=>a+value(r),0), h=rs.reduce((a,r)=>a+hours(r),0);return `<section class="page-head"><div><div class="eyebrow">Visão geral</div><h1>Seu ritmo, do seu jeito.</h1></div><div class="segmented"><button class="${state.tab==='summary'?'active':''}" onclick="state.tab='summary';render()">Resumo</button><button class="${state.tab==='records'?'active':''}" onclick="state.tab='records';render()">Registro de tempo</button></div></section><div class="filters"><select class="select" style="max-width:220px" onchange="state.filter=this.value;save();render()"><option value="all">Todos os trabalhos</option>${state.works.map(w=>`<option value="${w.id}" ${state.filter===w.id?'selected':''}>${w.name}</option>`).join('')}</select></div>${state.tab==='summary'?`<div class="summary glass"><div class="primary"><span class="label">Total a receber</span><div class="money">${money(total)}</div><span class="delta">↑ 12% em relação ao período anterior</span></div><div><span class="label">Horas trabalhadas</span><div class="hours">${fmtH(h)}</div><span class="label">${rs.length} registros no período</span></div><div class="ring-row"><div class="ring"></div><div><span class="label">Meta semanal</span><div class="hours">${fmtH(h)} / 30h</div><span class="delta">Faltam ${fmtH(Math.max(0,30-h))}</span></div></div></div><div class="grid"><div class="card glass"><h3 class="card-title">Evolução de ganhos</h3><span class="label">Últimos 7 dias</span><div class="chart"><svg viewBox="0 0 600 190" preserveAspectRatio="none"><defs><linearGradient id="fill" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#5f90ff"/><stop offset="1" stop-color="#a8c4ff" stop-opacity="0"/></linearGradient></defs><path class="axis" d="M0 40H600M0 100H600M0 160H600"/><path class="area" d="M0,155 L100,126 L200,145 L300,70 L400,108 L500,42 L600,85 L600,190 L0,190Z"/><path class="line" d="M0,155 L100,126 L200,145 L300,70 L400,108 L500,42 L600,85"/><circle class="dot" cx="500" cy="42" r="5"/></svg></div><div class="chart-labels"><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Hoje</span></div></div><div class="card glass"><h3 class="card-title">Por trabalho</h3><span class="label">Distribuição dos ganhos</span><div class="donut-wrap"><div class="donut"></div><div class="legend">${state.works.map((w,i)=>`<div><span><i class="bullet" style="background:${['#4b7df8','#18ba87','#a878ef'][i%3]}"></i>${w.name}</span><b>${i?18:82}%</b></div>`).join('')}</div></div></div></div><div class="stats"><div class="stat glass"><span class="label">⚡ Mais produtivo</span><strong>Quinta-feira</strong><span class="delta">8h 15min registradas</span></div><div class="stat glass"><span class="label">✦ Maior ganho</span><strong>${money(Math.max(0,...rs.map(value)))}</strong><span class="delta">Consultoria UX · 15 jul</span></div></div>`:`<div class="card glass"><h3 class="card-title">Todos os registros</h3><p class="label">Toque em um registro para editar.</p><div class="records">${recordsList(state.records)}</div></div>`}<div class="period">${['day','week','month'].map(p=>`<button class="${state.period===p?'active':''}" onclick="state.period='${p}';save();render()">${{day:'Dia',week:'Semana',month:'Mês'}[p]}</button>`).join('')}</div>`}
