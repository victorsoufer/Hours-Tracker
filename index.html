function hours(r){if(!r.start||!r.end)return 0;let [a,b]=[r.start,r.end].map(x=>{let [h,m]=x.split(':').map(Number);return h*60+m});if(b<a)b+=1440;return Math.max(0,(b-a-(+r.break||0))/60)}function value(r){return hours(r)*(+r.rate||0)+(+r.extra||0)}function fmtH(n){let m=Math.round(n*60);return `${Math.floor(m/60)}h ${m%60}min`};function dateLabel(d){return new Date(d+'T12:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})}

function dashboard(){let rs=filtered(), total=rs.reduce((a,r)=>a+value(r),0), h=rs.reduce((a,r)=>a+hours(r),0);return `<section class="page-head"><div><div class="eyebrow">Visão geral</div><h1>Seu ritmo, do seu jeito.</h1></div><div class="segmented"><button class="${state.tab==='summary'?'active':''}" onclick="state.tab='summary';render()">Resumo</button><button class="${state.tab==='records'?'active':''}" onclick="state.tab='records';render()">Registro de tempo</button></div></section><div class="filters"><select class="select" style="max-width:220px" onchange="state.filter=this.value;save();render()"><option value="all">Todos os trabalhos</option>${state.works.map(w=>`<option value="${w.id}" ${state.filter===w.id?'selected':''}>${w.name}</option>`).join('')}</select></div>${state.tab==='summary'?`<div class="summary glass"><div class="primary"><span class="label">Total a receber</span><div class="money">${money(total)}</div><span class="delta">↑ 12% em relação ao período anterior</span></div><div><span class="label">Horas trabalhadas</span><div class="hours">${fmtH(h)}</div><span class="label">${rs.length} registros no período</span></div><div class="ring-row"><div class="ring"></div><div><span class="label">Meta semanal</span><div class="hours">${fmtH(h)} / 30h</div><span class="delta">Faltam ${fmtH(Math.max(0,30-h))}</span></div></div></div><div class="grid"><div class="card glass"><h3 class="card-title">Evolução de ganhos</h3><span class="label">Últimos 7 dias</span><div class="chart"><svg viewBox="0 0 600 190" preserveAspectRatio="none"><defs><linearGradient id="fill" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#5f90ff"/><stop offset="1" stop-color="#a8c4ff" stop-opacity="0"/></linearGradient></defs><path class="axis" d="M0 40H600M0 100H600M0 160H600"/><path class="area" d="M0,155 L100,126 L200,145 L300,70 L400,108 L500,42 L600,85 L600,190 L0,190Z"/><path class="line" d="M0,155 L100,126 L200,145 L300,70 L400,108 L500,42 L600,85"/><circle class="dot" cx="500 function go(p){state.page=p;render()}function openRecord(id){let r=id?state.records.find(x=>x.id===id):{id:'',date:state.selected,workId:'',start:'',end:'',break:'',rate:'',extra:'',note:''};let title=id?'Editar registro':'Registrar dia';modal=`<div class="modal"><div class="modal-panel"><div class="modal-head"><button class="close" onclick="modal=null;render()">×</button><h2>${title}</h2><button class="save" onclick="saveRecord('${r.id}')">Salvar</button></div><div class="calc glass"><span><span class="label">Total estimado</span><br><b id="live-hours">0h 0min</b></span><b id="live-value">R$ 0,00</b></div><div class="form-grid"><div class="field full"><label>Escolher trabalho</label><select id="r-work" class="select" onchange="fillWork()"><option value="">Selecione um trabalho</option>${state.works.map(w=>`<option value="${w.id}" ${r.workId===w.id?'selected':''}>${w.name}</option>`).join('')}</select></div><div class="field"><label>Data</label><input id="r-date" type="date" value="${r.date}"></div><div class="field"><label>Pausa (minutos)</label><input id="r-break" type="number" value="${r.break}" oninput="calcLive()"></div><div class="field"><label>Início</label><input id="r-start" type="time" value="${r.start}" oninput="calcLive()"></div><div class="field"><label>Fim</label><input id="r-end" type="time" value="${r.end}" oninput="calcLive()"></div><div class="field"><label>Valor/hora</label><input id="r-rate" inputmode="decimal" value="${r.rate}" oninput="calcLive()"></div><div class="field"><label>Valor extra</label><input id="r-extra" inputmode="decimal" value="${r.extra}" oninput="calcLive()"></div><div class="field full"><label>Notas</label><textarea id="r-note" rows="3">${r.note||''}</textarea></div></div>${id?'<button class="close" style="width:auto;padding:10px 15px;color:#bd3450;margin-top:18px" onclick="deleteRecord(\''+id+'\')">Excluir registro</button>':''}</div></div>`;render();calcLive()}
function val(id){return $(id).value}function fillWork(){let w=work(val('#r-work'));if(!w)return;$('#r-start').value=w.start;$('#r-end').value=w.end;$('#r-break').value=w.break;$('#r-rate').value=w.rate;$('#r-extra').value=w.extra;calcLive()}function calcLive(){let r={start:val('#r-start'),end:val('#r-end'),break:val('#r-break'),rate:String(val('#r-rate')).replace(',','.'),extra:String(val('#r-extra')).replace(',','.')};$('#live-hours').textContent=fmtH(hours(r));$('#live-value').textContent=money(value(r))}function saveRecord(id){let r={id:id||Date.now().toString(),workId:val('#r-work'),date:val('#r-date'),start:val('#r-start'),end:val('#r-end'),break:+val('#r-break')||0,rate:+String(val('#r-rate')).replace(',','.')||0,extra:+String(val('#r-extra')).replace(',','.')||0,note:val('#r-note')};if(!r.workId||!r.start||!r.end){toast('Escolha um trabalho e informe os horários.');return}if(id)state.records=state.records.map(x=>x.id===id?r:x);else state.records.push(r);state.selected=r.date;modal=null;toast('Registro salvo com sucesso.');render()}function deleteRecord(id){state.records=state.records.filter(x=>x.id!==id);modal=null;toast('Registro excluído.');render()}

function saveGoal(){state.goalHours=Math.max(1,+val('#goal-hours')||30);modal=null;save();render();toast('Meta semanal atualizada.')}
function chooseCover(){let input=$('#cover-input');if(input?.files?.[0]){let reader=new FileReader();reader.onload=()=>{state.profile.cover=reader.result;$('#cover-preview').style.backgroundImage=`url(${reader.result})`;save();toast('Foto de capa adicionada.')};reader.readAsDataURL(input.files[0])}}
openProfile=function(){let cover=state.profile.cover?`style="background-image:url('${state.profile.cover}')"`:'';modal=`<div class="modal"><div class="modal-panel"><div class="modal-head"><button class="close" onclick="modal=null;render()">×</button><h2>Perfil</h2><button class="save" onclick="saveProfile()">Salvar</button></div><div id="cover-preview" class="app-cover" ${cover}><button onclick="document.querySelector('#cover-input').click()">Alterar capa</button></div><input id="cover-input" type="file" accept="image/*" style="display:none" onchange="chooseCover()"><div class="form-grid"><div class="field full"><label>Nome</label><input id="p-name" value="${state.profile.name}"></div><div class="field"><label>Data de aniversário</label><input id="p-birthday" type="date" value="${state.profile.birthday}"></div><div class="field"><label>E-mail de cadastro</label><input value="${state.profile.email}" readonly></div></div></div></div>`;render()}
savePrefs=function(){state.prefs.theme=val('#pref-theme');state.prefs.currency=val('#pref-currency');state.prefs.dateFormat=val('#pref-date');modal=null;save();applyTheme();render();toast('Preferências salvas.')}
let baseRender=render;render=function(){applyTheme();baseRender();enhanceDashboard()};
/* Mobile/PWA refinements: keep filters and goal behavior in the data layer. */
dashboard=function(){
  const rs=filtered(), total=rs.reduce((sum,r)=>sum+value(r),0), worked=rs.reduce((sum,r)=>sum+hours(r),0), goal=state.goalHours;
  const filter=`<div class="filters"><select class="select" aria-label="Filtrar trabalho" style="max-width:250px" onchange="state.filter=this.value;save();render()"><option value="all">Todos os trabalhos</option>${state.works.map(w=>`<option value="${w.id}" ${state.filter===w.id?'selected':''}>${w.name}</option>`).join('')}</select></div>`;
  const tabs=`<section class="page-head"><div><div class="eyebrow">Visão geral</div><h1>Seu ritmo, do seu jeito.</h1></div><div class="segmented"><button class="${state.tab==='summary'?'active':''}" onclick="state.tab='summary';render()">Resumo</button><button class="${state.tab==='records'?'active':''}" onclick="state.tab='records';render()">Registro de tempo</button></div></section>`;
  const period=`<div class="period">${[['day','Dia'],['week','Semana'],['month','Mês']].map(([id,label])=>`<button class="${state.period===id?'active':''}" onclick="state.period='${id}';save();render()">${label}</button>`).join('')}</div>`;
  if(state.tab==='records')return `${tabs}${filter}<div class="card glass"><h3 class="card-title">Registros filtrados</h3><p class="label">${state.filter==='all'?'Todos os trabalhos':'Somente o trabalho selecionado'} · ${rs.length} registro${rs.length===1?'':'s'}</p><div class="records">${recordsList([...rs])}</div></div>${period}`;
  const remaining=Math.max(0,goal-worked), pct=Math.min(100,Math.round((worked/goal)*100));
  return `${tabs}${filter}<div class="summary glass"><div class="primary"><span class="label">Total a receber</span><div class="money">${money(total)}</div><span class="delta">${rs.length} registros no período</span></div><div><span class="label">Horas trabalhadas</span><div class="hours">${fmtH(worked)}</div><span class="label">Período selecionado</span></div><button class="ring-row" style="border:0;background:transparent;text-align:left;color:inherit" onclick="openGoal()"><div class="ring" style="background:conic-gradient(var(--green) 0 ${pct}%,#dbe9e8 ${pct}% 100%)"></div><div><span class="label">Meta semanal · editar</span><div class="hours">${fmtH(worked)} / ${goal}h</div><span class="delta">${remaining?`Faltam ${fmtH(remaining)}`:'Meta concluída!'}</span></div></button></div><div class="grid"><div class="card glass"><h3 class="card-title">Evolução de ganhos</h3><span class="label">Últimos lançamentos</span><div class="chart"><svg viewBox="0 0 600 190" preserveAspectRatio="none"><defs><linearGradient id="fill" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#5f90ff"/><stop offset="1" stop-color="#a8c4ff" stop-opacity="0"/></linearGradient></defs><path class="axis" d="M0 40H600M0 100H600M0 160H600"/><path class="area" d="M0 155L100 126L200 145L300 70L400 108L500 42L600 85L600 190L0 190Z"/><path class="line" d="M0 155L100 126L200 145L300 70L400 108L500 42L600 85"/></svg></div><div class="chart-labels"><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Hoje</span></div></div><div class="card glass"><h3 class="card-title">Por trabalho</h3><span class="label">Distribuição dos ganhos</span><div class="donut-wrap"><div class="donut"></div><div class="legend">${state.works.map((w,i)=>`<div><span><i class="bullet" style="background:${['#4b7df8','#18ba87','#a878ef'][i%3]}"></i>${w.name}</span><b>${rs.filter(r=>r.workId===w.id).length}</b></div>`).join('')}</div></div></div></div>${period}`;
};
enhanceDashboard=function(){};
openProfile=function(){
  const photo=state.profile.cover?`style="background-image:url('${state.profile.cover}')"`:'';
  modal=`<div class="modal"><div class="modal-panel"><div class="modal-head"><button class="close" onclick="modal=null;render()">×</button><h2>Perfil</h2><button class="save" onclick="saveProfile()">Salvar</button></div><div id="cover-preview" class="profile-photo" ${photo}><button onclick="document.querySelector('#cover-input').click()">Foto 3×4</button></div><input id="cover-input" type="file" accept="image/*" style="display:none" onchange="chooseCover()"><p class="label" style="text-align:center;margin:-10px 0 18px">Foto de perfil · proporção 3×4</p><div class="form-grid"><div class="field full"><label>Nome</label><input id="p-name" value="${state.profile.name}"></div><div class="field"><label>Data de aniversário</label><input id="p-birthday" type="date" value="${state.profile.birthday}"></div><div class="field"><label>E-mail de cadastro</label><input value="${state.profile.email}" readonly></div></div></div></div>`;render();
};
header=function(){const photo=state.profile.cover?`<img src="${state.profile.cover}" alt="Foto de ${state.profile.name}">`:(state.profile.name[0]||'L');return `<header class="topbar"><div class="brand"><i></i>horas</div><div class="profile"><span>Olá, ${state.profile.name.split(' ')[0]}</span><div class="avatar">${photo}</div></div></header>`};
recordsList=function(rs){return [...rs].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`<div class="record" onclick="openRecord('${r.id}')"><div class="date-badge">${new Date(r.date+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</div><div class="record-main"><b>${r.customWork||work(r.workId)?.name||'Horário avulso'}</b><span>${r.start} – ${r.end} · ${fmtH(hours(r))}</span></div><div class="record-value">${money(value(r))}<span>${dateLabel(r.date)}</span></div></div>`).join('')||'<p class="label">Nenhum registro encontrado.</p>'};
openRecord=function(id){const r=id?state.records.find(x=>x.id===id):{id:'',date:state.selected,workId:'',customWork:'',start:'',end:'',break:'',rate:'',extra:'',note:''};modal=`<div class="modal"><div class="modal-panel"><div class="modal-head"><button class="close" onclick="modal=null;render()">×</button><h2>${id?'Editar registro':'Registrar dia'}</h2><button class="save" onclick="saveRecord('${r.id}')">Salvar</button></div><div class="calc glass"><span><span class="label">Total estimado</span><br><b id="live-hours">0h 0min</b></span><b id="live-value">R$ 0,00</b></div><div class="form-grid"><div class="field full"><label>Trabalho cadastrado (opcional)</label><select id="r-work" class="select" onchange="fillWork()"><option value="">Não selecionar trabalho</option>${state.works.map(w=>`<option value="${w.id}" ${r.workId===w.id?'selected':''}>${w.name}</option>`).join('')}</select></div><div class="field full"><label>Nome do trabalho ou cliente (opcional)</label><input id="r-custom-work" value="${r.customWork||''}" placeholder="Ex.: Cliente Maria, plantão extra…"></div><div class="field"><label>Data</label><input id="r-date" type="date" value="${r.date}"></div><div class="field"><label>Pausa (minutos)</label><input id="r-break" type="number" value="${r.break}" oninput="calcLive()"></div><div class="field"><label>Início</label><input id="r-start" type="time" value="${r.start}" oninput="calcLive()"></div><div class="field"><label>Fim</label><input id="r-end" type="time" value="${r.end}" oninput="calcLive()"></div><div class="field"><label>Valor/hora</label><input id="r-rate" inputmode="decimal" value="${r.rate}" oninput="calcLive()"></div><div class="field"><label>Valor extra</label><input id="r-extra" inputmode="decimal" value="${r.extra}" oninput="calcLive()"></div><div class="field full"><label>Notas</label><textarea id="r-note" rows="3">${r.note||''}</textarea></div></div>${id?`<button class="close" style="width:auto;padding:10px 15px;color:#bd3450;margin-top:18px" onclick="deleteRecord('${id}')">Excluir registro</button>`:''}</div></div>`;render();calcLive()};
saveRecord=function(id){const r={id:id||Date.now().toString(),workId:val('#r-work'),customWork:val('#r-custom-work').trim(),date:val('#r-date'),start:val('#r-start'),end:val('#r-end'),break:+val('#r-break')||0,rate:+String(val('#r-rate')).replace(',','.')||0,extra:+String(val('#r-extra')).replace(',','.')||0,note:val('#r-note')};if(!r.start||!r.end){toast('Informe os horários de início e fim.');return}if(id)state.records=state.records.map(x=>x.id===id?r:x);else state.records.push(r);state.selected=r.date;modal=null;save();render();toast('Registro salvo com sucesso.')};
function settingIcon(kind){const icons={profile:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20c.7-4 2.9-6 7.5-6s6.8 2 7.5 6"/></svg>',custom:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><path d="M12 5v14M5 12h14"/></svg>',backup:'<svg viewBox="0 0 24 24"><path d="M7 18.5h10a4 4 0 0 0 .6-7.9A5.8 5.8 0 0 0 6.5 9.3 4.6 4.6 0 0 0 7 18.5Z"/><path d="M12 10v7m-3-3 3 3 3-3"/></svg>',lock:'<svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>',share:'<svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="2"/><circle cx="6" cy="12" r="2"/><circle cx="18" cy="19" r="2"/><path d="m8 11 8-5m-8 7 8 5"/></svg>',star:'<svg viewBox="0 0 24 24"><path d="m12 3 2.7 5.6 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1-4.4-4.3 6.1-.9Z"/></svg>',about:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 11v5m0-8h.01"/></svg>',mail:'<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/></svg>'};return icons[kind]};
settings=function(){const rows=[['profile','Perfil','Nome, foto 3×4 e e-mail','openProfile()'],['custom','Personalizar',`Tema, moeda (${state.prefs.currency}) e data`,'openCustomize()'],['backup','Relatórios / backups','Exportar dados e backup na nuvem','openBackup()'],['lock','Bloqueio de senha','Proteja o acesso ao app',"toast('Configure uma senha de bloqueio nesta demonstração.')"],['share','Compartilhar este app','Envie o app para amigos','shareApp()'],['star','Avaliar app','Conte como está sendo sua experiência',"toast('A página de avaliação será aberta na loja.')"],['about','Sobre','Recursos, créditos e versão','openAbout()'],['mail','Contate-nos','Fale com a nossa equipe',"location.href='mailto:suporte@horas.app?subject=Suporte%20Horas'"]];return `<section class="page-head"><div><div class="eyebrow">Sua conta</div><h1>Ajustes</h1></div></section><div class="glass settings-list">${rows.map(r=>`<div class="setting-row" onclick="${r[3]}"><div class="setting-icon">${settingIcon(r[0])}</div><div><b>${r[1]}</b><span>${r[2]}</span></div><i class="chev">›</i></div>`).join('')}</div>`};
openBackup=function(){modal=`<div class="modal"><div class="modal-panel"><div class="modal-head"><button class="close" onclick="modal=null;render()">×</button><h2>Relatórios / backups</h2><button class="save" onclick="toast('Backup iniciado nesta demonstração.')">Backup</button></div><div class="segmented"><button class="active">Google Drive</button><button>iCloud</button></div><div class="card glass" style="margin-top:15px"><h3 class="card-title">Exportar dados</h3><div class="form-grid" style="margin-top:13px"><div class="field"><label>Data inicial</label><input type="date" value="2026-07-01"></div><div class="field"><label>Data final</label><input type="date" value="2026-07-18"></div></div><div class="backup-actions"><button class="save" onclick="exportCSV()">Exportar CSV</button><button class="save" style="background:#263c62" onclick="window.print()">Exportar PDF</button></div></div><div class="reports" style="margin-top:14px"><div class="report-action glass" onclick="toast('Relatório de horas aberto.')"><div class="report-icon">◴</div><b>Tempo de trabalho</b><span>Evolução no período</span></div><div class="report-action glass" onclick="toast('Relatório de salário aberto.')"><div class="report-icon">↗</div><b>Salário</b><span>Ganhos por trabalho</span></div><div class="report-action glass" onclick="toast('Ainda não há dados suficientes para tendência.')"><div class="report-icon">⌁</div><b>Tendências</b><span>Estimativa futura</span></div></div></div></div>`;render()};
/* Swipe actions: reveal actions with a left swipe, like iOS list rows. */
recordsList=function(rs){return [...rs].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`<div class="swipe-row" data-swipe="record" data-id="${r.id}" style="--swipe-width:-172px"><div class="swipe-actions"><button class="swipe-action duplicate" onclick="event.stopPropagation();duplicateRecord('${r.id}')"><span>⧉</span>Duplicar</button><button class="swipe-action delete" onclick="event.stopPropagation();deleteRecord('${r.id}')"><span>⌫</span>Excluir</button></div><div class="record swipe-content" onclick="openRecord('${r.id}')"><div class="date-badge">${new Date(r.date+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</div><div class="record-main"><b>${r.customWork||work(r.workId)?.name||'Horário avulso'}</b><span>${r.start} – ${r.end} · ${fmtH(hours(r))}</span></div><div class="record-value">${money(value(r))}<span>${dateLabel(r.date)}</span></div></div></div>`).join('')||'<p class="label">Nenhum registro encontrado.</p>'};
function duplicateRecord(id){const source=state.records.find(r=>r.id===id);if(!source)return;const next=new Date(source.date+'T12:00');next.setDate(next.getDate()+1);openDuplicateModal({...source,date:next.toISOString().slice(0,10)})}
function openDuplicateModal(r){modal=`<div class="modal"><div class="modal-panel"><div class="modal-head"><button class="close" onclick="modal=null;render()">×</button><h2>Duplicar registro</h2><button class="save" onclick="saveDuplicatedRecord()">Salvar</button></div><div class="calc glass"><span><span class="label">Total estimado</span><br><b id="live-hours">0h 0min</b></span><b id="live-value">R$ 0,00</b></div><div class="form-grid"><div class="field full"><label>Trabalho cadastrado (opcional)</label><select id="r-work" class="select" onchange="fillWork()"><option value="">Não selecionar trabalho</option>${state.works.map(w=>`<option value="${w.id}" ${r.workId===w.id?'selected':''}>${w.name}</option>`).join('')}</select></div><div class="field full"><label>Nome do trabalho ou cliente (opcional)</label><input id="r-custom-work" value="${r.customWork||''}" placeholder="Ex.: Cliente Maria, plantão extra…"></div><div class="field"><label>Nova data</label><input id="r-date" type="date" value="${r.date}"></div><div class="field"><label>Pausa (minutos)</label><input id="r-break" type="number" value="${r.break}" oninput="calcLive()"></div><div class="field"><label>Início</label><input id="r-start" type="time" value="${r.start}" oninput="calcLive()"></div><div class="field"><label>Fim</label><input id="r-end" type="time" value="${r.end}" oninput="calcLive()"></div><div class="field"><label>Valor/hora</label><input id="r-rate" inputmode="decimal" value="${r.rate}" oninput="calcLive()"></div><div class="field"><label>Valor extra</label><input id="r-extra" inputmode="decimal" value="${r.extra}" oninput="calcLive()"></div><div class="field full"><label>Notas</label><textarea id="r-note" rows="3">${r.note||''}</textarea></div></div></div></div>`;render();calcLive()}
function saveDuplicatedRecord(){const r={id:Date.now().toString(),workId:val('#r-work'),customWork:val('#r-custom-work').trim(),date:val('#r-date'),start:val('#r-start'),end:val('#r-end'),break:+val('#r-break')||0,rate:+String(val('#r-rate')).replace(',','.')||0,extra:+String(val('#r-extra')).replace(',','.')||0,note:val('#r-note')};if(!r.start||!r.end){toast('Informe os horários de início e fim.');return}state.records.push(r);state.selected=r.date;modal=null;save();render();toast('Registro duplicado com sucesso.')}
works=function(){return `<section class="page-head"><div><div class="eyebrow">Configuração</div><h1>Meus trabalhos</h1></div></section><div class="work-list">${state.works.map(w=>`<div class="swipe-row" data-swipe="work" data-id="${w.id}" style="--swipe-width:-86px"><div class="swipe-actions"><button class="swipe-action delete" onclick="event.stopPropagation();deleteWorkFromSwipe('${w.id}')"><span>⌫</span>Excluir</button></div><div class="work glass swipe-content" onclick="openWork('${w.id}')"><div class="work-icon">${w.icon||'✦'}</div><div class="work-info"><b>${w.name}</b><span>${w.start} – ${w.end} · pausa de ${w.break} min · ${money(w.rate)}/h</span></div><span class="tag">Ativo</span></div></div>`).join('')}</div>`};
function deleteWorkFromSwipe(id){if(state.records.some(r=>r.workId===id)){toast('Exclua ou altere os registros deste trabalho antes.');return}state.works=state.works.filter(w=>w.id!==id);save();render();toast('Trabalho excluído.')}
function bindSwipeRows(){document.querySelectorAll('.swipe-row').forEach(row=>{if(row.dataset.bound)return;row.dataset.bound='1';const content=row.querySelector('.swipe-content');let startX=0,dx=0,dragging=false;content.addEventListener('pointerdown',e=>{startX=e.clientX;dx=0;dragging=true;content.setPointerCapture?.(e.pointerId)});content.addEventListener('pointermove',e=>{if(!dragging)return;dx=Math.min(0,e.clientX-startX);if(dx<-8){content.style.transition='none';content.style.transform=`translateX(${Math.max(dx,parseInt(getComputedStyle(row).getPropertyValue('--swipe-width')))}px)`}});content.addEventListener('pointerup',()=>{if(!dragging)return;dragging=false;content.style.transition='';if(dx<-54)row.classList.add('open');else row.classList.remove('open');content.style.transform=''});content.addEventListener('click',()=>{if(row.classList.contains('open')){row.classList.remove('open');return}})});document.addEventListener('pointerdown',e=>{if(!e.target.closest('.swipe-row'))document.querySelectorAll('.swipe-row.open').forEach(x=>x.classList.remove('open'))},{once:true})}
const previousRender=render;render=function(){previousRender();bindSwipeRows()};
render();
</script>
  <script>if('serviceWorker' in navigator && location.protocol !== 'file:')navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
